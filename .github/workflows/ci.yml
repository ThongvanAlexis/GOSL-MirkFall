name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# fail-fast notes:
# The three jobs below (gates / android / ios) are declared independently —
# NOT via a matrix — because they run distinct build pipelines with different
# runners (ubuntu-latest × 2, macos-14 × 1). `fail-fast: true` is a matrix-only
# knob, so it does not apply here. The behaviour we want is already the
# default: if `gates` fails, its two dependents (`android`, `ios` via
# `needs: gates`) are skipped automatically. If `android` fails while `ios`
# is still running, `ios` continues — intentional, so we surface platform-
# specific breakage on both platforms in a single CI run rather than
# masking one failure behind another. Reviewed 2026-04-17 (finding #42).

jobs:

  gates:
    name: Lint / Licence / Headers / Deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Phase 03: SQLite native library is required by `dart test` runs that
      # touch Drift's `NativeDatabase.memory()` (03-04 onward). Installed on
      # the gates job ahead of any `dart test` invocation so no downstream
      # plan needs to re-edit the workflow when its tests land.
      - name: Install libsqlite3 (for dart test + NativeDatabase.memory)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - name: Dart format check
        # --line-length 160 matches CLAUDE.md §Longueur de ligne (override Dart's default 80).
        # Without this flag, CI would reformat every file to 80 chars and fail.
        run: dart format --line-length 160 --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Check GOSL headers
        run: dart run tool/check_headers.dart

      - name: Check licenses (GPL/AGPL/copyleft scan)
        run: dart run tool/check_licenses.dart

      - name: Check DEPENDENCIES.md is up to date
        run: dart run tool/check_dependencies_md.dart

      # Phase 03 SC#4: lib/domain/ must not import package:flutter or
      # package:drift. Currently a no-op (lib/domain/ holds only a README)
      # but starts failing the moment 03-02 / 03-03 land their first
      # domain types — the failure mode catches accidental coupling early.
      - name: Check domain purity (lib/domain/ imports)
        run: dart run tool/check_domain_purity.dart

      - name: Tool scripts unit tests
        run: dart test tool/test/

      # Phase 03: schema-drift guard for the rolling current schema dump.
      # Defensively guarded by `hashFiles` so the step is a no-op until
      # 03-04 ships lib/infrastructure/db/app_database.dart. Once that
      # file exists, every PR must run `dart run drift_dev schema dump
      # lib/infrastructure/db/app_database.dart drift_schemas/drift_schema_current.json`
      # locally; CI re-runs the dump and `git diff --exit-code` proves the
      # checked-in current.json is fresh. The version-specific
      # drift_schema_v{1,2}.json fixtures are FROZEN historical snapshots
      # produced once at schema-version bump time (03-04 / future) and are
      # NEVER touched by this step (would otherwise break round-trip
      # SchemaVerifier tests after a V2 bump overwrites the V1 fixture).
      - name: Check drift schema (current) is committed and fresh
        if: ${{ hashFiles('lib/infrastructure/db/app_database.dart') != '' }}
        run: |
          dart run drift_dev schema dump lib/infrastructure/db/app_database.dart drift_schemas/drift_schema_current.json
          git diff --exit-code drift_schemas/drift_schema_current.json || {
            echo "::error::drift_schemas/drift_schema_current.json is stale.";
            echo "Run: dart run drift_dev schema dump lib/infrastructure/db/app_database.dart drift_schemas/drift_schema_current.json";
            exit 1;
          }

      - name: Flutter unit + widget tests
        run: flutter test

      - name: Flutter test with DEBUG define
        run: flutter test --dart-define=DEBUG=true test/file_logger_debug_define_test.dart

      # Plain-Dart test runner for pure-Dart suites (no Flutter binding,
      # no platform channels). Scoped EXPLICITLY to subdirectories known
      # to be pure-Dart. Flutter-binding tests (test/infrastructure/gps/,
      # notifications/, platform/) already run under `flutter test` above
      # and MUST NOT be double-executed here — `dart test` cannot load
      # them (ServicesBinding, MethodChannel mocking, etc. require the
      # Flutter test harness).
      #
      # Allowed pure-Dart subdirectories :
      # - test/domain/              — pure domain types (Phase 03)
      # - test/infrastructure/db/   — Drift + NativeDatabase.memory (Phase 03)
      # - test/infrastructure/stores/ — Drift store impls (Phase 03)
      # - test/infrastructure/ids/  — ULID + id converters (Phase 03)
      # - test/infrastructure/migration/ — JsonMigrator (Phase 03)
      #
      # Downstream plans adding a new pure-Dart test subdir MUST add an
      # explicit line here — do not re-introduce a blanket
      # `test/infrastructure/` invocation : that mask silently drags in
      # Flutter-binding tests from sibling subdirs and fails the load
      # step.
      - name: Plain-Dart domain + infra tests
        if: ${{ hashFiles('test/domain/**/*_test.dart', 'test/infrastructure/db/**/*_test.dart', 'test/infrastructure/stores/**/*_test.dart', 'test/infrastructure/ids/**/*_test.dart', 'test/infrastructure/migration/**/*_test.dart') != '' }}
        run: |
          # Each directory is optional — the `-d` guard silently skips
          # anything that does not exist yet.
          if [ -d test/domain ]; then dart test test/domain/; fi
          if [ -d test/infrastructure/db ]; then dart test test/infrastructure/db/; fi
          if [ -d test/infrastructure/stores ]; then dart test test/infrastructure/stores/; fi
          if [ -d test/infrastructure/ids ]; then dart test test/infrastructure/ids/; fi
          if [ -d test/infrastructure/migration ]; then dart test test/infrastructure/migration/; fi

  android:
    name: Build Android APK (debug)
    needs: gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Forensic dump of the runner environment. Runs after `flutter pub get`
      # so the toolchain is fully hydrated, but before the build step, so a
      # build failure leaves this trace above it in the log. `continue-on-error`
      # ensures a failing diagnostic never breaks the build.
      - name: Forensic analysis
        continue-on-error: true
        run: |
          echo "=== Runner info ==="
          uname -a || true
          echo "RUNNER_OS=$RUNNER_OS RUNNER_ARCH=$RUNNER_ARCH"
          lsb_release -a 2>/dev/null || true
          echo ""
          echo "=== Flutter ==="
          flutter --version || true
          echo ""
          echo "=== Dart ==="
          dart --version || true
          echo ""
          echo "=== JDK ==="
          java -version 2>&1 || true
          javac -version 2>&1 || true
          echo ""
          echo "=== Gradle (project wrapper) ==="
          if [ -f android/gradlew ]; then
            (cd android && ./gradlew --version) || true
          else
            echo "android/gradlew not present"
          fi
          echo ""
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if command -v sdkmanager >/dev/null 2>&1; then
            sdkmanager --list_installed 2>&1 | head -80 || true
          else
            echo "sdkmanager not on PATH"
          fi
          echo ""
          echo "=== flutter doctor -v ==="
          flutter doctor -v || true
          echo ""
          echo "=== flutter pub deps (compact) ==="
          flutter pub deps --no-dev --style=compact || true
          echo ""
          echo "=== Disk space ==="
          df -h || true
          echo ""
          echo "=== Env ==="
          echo "PATH=$PATH"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "PUB_CACHE=$PUB_CACHE"

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirkfall-android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  ios:
    name: Build iOS (no-codesign)
    needs: gates
    # Pin runner per RESEARCH.md §Pitfall 3 (macos-latest auto-rolls)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Forensic dump of the runner environment. Runs after `flutter pub get`
      # so the toolchain is fully hydrated, but before the `pod install` +
      # build steps, so any iOS-specific failure leaves this trace above it
      # in the log. `continue-on-error` ensures a failing diagnostic never
      # breaks the build.
      - name: Forensic analysis
        continue-on-error: true
        run: |
          echo "=== Runner info ==="
          uname -a || true
          echo "RUNNER_OS=$RUNNER_OS RUNNER_ARCH=$RUNNER_ARCH"
          sw_vers || true
          echo ""
          echo "=== Flutter ==="
          flutter --version || true
          echo ""
          echo "=== Dart ==="
          dart --version || true
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version || true
          xcode-select -p || true
          echo ""
          echo "=== CocoaPods ==="
          pod --version || true
          echo ""
          echo "=== flutter doctor -v ==="
          flutter doctor -v || true
          echo ""
          echo "=== flutter pub deps (compact) ==="
          flutter pub deps --no-dev --style=compact || true
          echo ""
          echo "=== ios/Podfile.lock state ==="
          if [ -f ios/Podfile.lock ]; then
            echo "exists, $(wc -c < ios/Podfile.lock) bytes"
            head -5 ios/Podfile.lock || true
            echo "--- tail ---"
            tail -5 ios/Podfile.lock || true
          else
            echo "absent"
          fi
          echo ""
          echo "=== Disk space ==="
          df -h || true
          echo ""
          echo "=== Env ==="
          echo "PATH=$PATH"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "PUB_CACHE=$PUB_CACHE"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"

      # Windows-dev bootstrap: `ios/Podfile.lock` cannot be generated on
      # Windows (no CocoaPods), so Plan 01-01 committed a comment-only
      # placeholder. CocoaPods 1.x rejects an invalid lockfile with
      # "Invalid Lockfile" instead of overwriting it, so we detect and
      # remove a placeholder before `pod install`. Real lockfiles contain
      # a `COCOAPODS:` footer — absence of that marker signals a placeholder.
      - name: Remove placeholder Podfile.lock (Windows-dev bootstrap)
        working-directory: ios
        run: |
          if [ -f Podfile.lock ] && ! grep -q "^COCOAPODS:" Podfile.lock; then
            echo "::warning::Placeholder Podfile.lock detected — removing before pod install"
            rm -f Podfile.lock
          fi

      - name: CocoaPods install
        working-directory: ios
        run: pod install

      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign

      # Package the unsigned Runner.app bundle into an unsigned `.ipa` so
      # it can be downloaded as a CI artifact and sideloaded onto an
      # iPhone via SideStore / AltStore / Sideloadly (see CLAUDE.md
      # §Plateformes — "Déploiement iOS : sideload via SideStore ou
      # équivalent, pas de compte Apple Developer payant"). An `.ipa` is
      # just a zip of `Payload/Runner.app`; the sideloader re-signs with
      # a free Apple ID at install time.
      #
      # Phase 15 will replace this with a signed .ipa + notarisation.
      # Until then, the output is unsigned-only and requires a sideloader
      # to install on a device.
      - name: Package unsigned IPA for sideloading
        run: |
          set -euo pipefail
          BUILD_DIR="build/ios/iphoneos"
          if [ ! -d "$BUILD_DIR/Runner.app" ]; then
            echo "::error::Expected Runner.app under $BUILD_DIR after flutter build ios"
            exit 1
          fi
          WORK_DIR="$(mktemp -d)"
          mkdir "$WORK_DIR/Payload"
          cp -R "$BUILD_DIR/Runner.app" "$WORK_DIR/Payload/"
          (cd "$WORK_DIR" && zip -qr "$GITHUB_WORKSPACE/mirkfall-unsigned.ipa" Payload)
          ls -la mirkfall-unsigned.ipa

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirkfall-ios-unsigned-ipa
          path: mirkfall-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
