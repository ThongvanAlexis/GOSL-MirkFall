include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    avoid_print: error
    use_build_context_synchronously: error
    missing_required_param: error
    missing_return: error
    todo: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"
    - "build/**"

linter:
  rules:
    avoid_print: true
    # depend_on_referenced_packages: direct imports MUST declare the package
    # in pubspec.yaml (not rely on transitive pulls). Inherited via
    # flutter_lints 6.0.0 → lints 6.1.0 → core.yaml; declared explicitly here
    # so the Phase 01 decision to promote yaml+test from transitive to direct
    # dev-deps stays documented at the rule level, and a future
    # flutter_lints release that drops this rule from "recommended" doesn't
    # silently relax our import hygiene.
    depend_on_referenced_packages: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    use_super_parameters: true
    avoid_redundant_argument_values: true
    require_trailing_commas: true
