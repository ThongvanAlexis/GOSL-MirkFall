# Tag slow migration tests so developers can `dart test -x migration` for the
# fast feedback path during TDD, and `dart test -t migration` for the
# heavyweight SchemaVerifier-based suite before committing.
#
# Phase 03 ships the tag declaration up front; 03-05 (migration plan) adds
# `tags: [migration]` to its test files as they land.
tags:
  migration:
    timeout: 2x
  # Phase 07 plan 07-04 — end-to-end download-pipeline soak tests. Spin up
  # a `shelf` MockHTTPServer per scenario + exercise the 7-step atomic
  # protocol against real sockets; wall-clock of 10–60 s per scenario is
  # typical. Excluded from the default `flutter test` / `dart test` suite
  # (same convention as the Phase 03 `migration` tag). Gate before merge:
  #   dart test --tags soak test/infrastructure/downloads/download_soak_test.dart
  soak:
    timeout: 10x
  # Phase 08 plan 08-04 — integration tests absorbed from Plan 07-07 +
  # phase_07_navigation_test. Live under `integration_test/` (Flutter
  # convention) so `flutter test integration_test/` discovers them, but
  # declared here as a known tag so the dart_test runner does not
  # complain with "tag not specified" when they run. Same on-demand
  # discipline as `soak`.
  integration:
    timeout: 2x
  # Phase 09 plan 09-08 — 50k-tile fixture perf probe + any other
  # wall-clock-sensitive render-pass benchmarks. Excluded from default
  # suite (same discipline as `soak`). Gate command:
  #   flutter test --tags mirk-perf test/performance/
  mirk-perf:
    timeout: 10x
